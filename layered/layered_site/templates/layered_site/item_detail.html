{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layered</title>
    <link rel="stylesheet" href="{% static 'layered_site/style.css' %}">
</head>
<body id="item_detail_page">
    <h1>{{ item.name }}</h1>

    <p>{{ item.description }}</p>
    <p>{{ item.cost }} layers</p>

    {% if item.imageUrl %}
    <img src="{{ item.imageUrl }}" alt="{{ item.name }}" loading="lazy">
    {% else %}
    <p>No image available for this item yet.</p>
    {% endif %}

    <p><a href="{% url 'shop' %}">Back to shop</a></p>
</body>
</html>
