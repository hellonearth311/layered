{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layered</title>
    <link rel="stylesheet" href="{% static 'layered_site/style.css' %}">
</head>
<body id="project_detail_page">
    <h1>{{ project.title }}</h1>

    <p>{{ project.description }}</p>

            View on Printables

    <p><a href="{% url 'projects' %}">Back to projects</a></p>

    <h2>Journal Entries</h2>

    <p>Note: Journal entries will be implemented once we have a HQ PoC and we can implement lapse :)</p>
