{# horizontal bar chart. expects: title, rows (label/value/bar, optional sub), empty, wide, fill_class #}
<div class="chart{% if wide %} wide{% endif %}">
    <h4>{{ title }}</h4>
    <div class="chart-bars">
        {% for row in rows %}
        <div class="chart-row" title="{{ row.label }}: {{ row.value }}">
            <span class="chart-name">{{ row.label }}</span>
            <span class="chart-track">
                <span class="chart-fill {{ fill_class }}" data-bar="{{ row.bar }}"></span>
            </span>
            <span class="chart-val">{{ row.value }}{% if row.sub %}<span class="chart-val-sub">{{ row.sub }}</span>{% endif %}</span>
        </div>
        {% empty %}
        <p class="chart-empty">{{ empty|default:"No data yet." }}</p>
        {% endfor %}
    </div>
</div>
